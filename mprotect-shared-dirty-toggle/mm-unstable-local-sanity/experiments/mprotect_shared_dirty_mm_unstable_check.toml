name = "mprotect_shared_dirty_mm_unstable_check"
source_file = "mm/mprotect.c"
generate_from_version = "6.19"
baseline_version = "6.19"
compare_versions = ["6.12", "6.19", "mm-unstable"]
tolerance = 0.05
repetitions = 9
max_cv = 0.10
description = "Focused clean performance check for David's Pedro mprotect optimization question: compare v6.12.77, v6.19.9, and akpm/mm mm-unstable for the shared-dirty full-range PTE toggle workload."

[[entry]]
kind = "workload"
profile = "mprotect_paths"
binary_name = "mmreg_mprotect_shared_dirty_mm_unstable_check"
scenarios = [
  "shared_dirty_full_toggle_64m",
]
metrics = [
  "cycle_ns_per_page",
  "protect_ns_per_page",
  "restore_ns_per_page",
]

[entry.overrides.defaults]
rounds = 4
max_rounds = 256
min_measure_ns = 1200000000
batch_ops = 1
touch_passes = 1
warmup_rounds = 2
prefault_before_protect = true
post_touch_mode = "write"

[[entry.overrides.scenario]]
name = "shared_dirty_full_toggle_64m"
pattern = "shared_dirty_full_toggle"
mapping_kb = 65536
protect_kb = 65536
